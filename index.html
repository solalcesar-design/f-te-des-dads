<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonne Fête Sébastien</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #667eea, #764ba2, #ff9a9e);
            background-size: 600% 600%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        .emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        h1 { margin: 10px 0; font-size: 2rem; }
        p { font-size: 1.2rem; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="emoji">♥️</div>
        <h1>Bonne Fête, Papa !</h1>
        <p>Le meilleur des papas. toute  la famille t'aime très fort Audrey, Charlise et César </p>
    </div>

</body>
</html>
