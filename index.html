<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bonne Fête, Sébastien !</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .emoji { font-size: 5rem; margin-top: 20px; }

        #confetti-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bonne Fête, Sébastien !</h1>
        <p>Le meilleur des papas.</p>
        <div class="emoji">👨‍👧‍👦</div>
    </div>
    
    <div id="confetti-container"></div>

    <script>
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = '#' + Math.floor(Math.random()*16777215).toString(16);
                confetti.style.animation = `fall ${Math.random() * 3 + 2}s linear infinite`;
                container.appendChild(confetti);
            }
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes fall { to { transform: translateY(100vh); } }`;
        document.head.appendChild(style);

        createConfetti();
    </script>
</body>
</html>
